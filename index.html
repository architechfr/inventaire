/* ========= HEADER ========= */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: var(--cream);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 4px 20px;
  display: flex; align-items: center; gap: 14px;
  min-height: 56px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  min-width: 0;
}
.brand-logo { width: 120px; height: 120px; object-fit: contain; flex-shrink: 0; }
.brand-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--olive-dark);
  white-space: nowrap;
}
.brand-tag {
  font-size: 13px; color: var(--ink-3);
  display: none;
}
@media (min-width: 720px) { .brand-tag { display: inline; } }

.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.iconbtn {
  width: 44px; height: 44px;
  border-radius: 14px;
  display: grid; place-items: center;
  color: var(--ink-2);
  transition: background .18s, transform .18s, color .18s;
}
.iconbtn:hover { background: var(--cream-deep); color: var(--ink); }
.iconbtn:active { transform: scale(0.94); }
.iconbtn.primary { background: var(--olive); color: #fff; }
.iconbtn.primary:hover { background: var(--olive-dark); }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 14px; border-radius: 14px;
  color: var(--olive-dark); font-weight: 700;
  transition: background .18s;
}
.back-btn:hover { background: var(--olive-soft); }

/* ========= MAIN ========= */
.main {
  flex: 1;
  max-width: 1280px; width: 100%;
  margin: 0 auto;
  padding: 28px 20px 80px;
}
@media (min-width: 1024px) { .main { padding: 36px 32px 100px; } }

.page-title {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: clamp(28px, 4vw, 42px);
  color: var(--ink);
  margin: 0 0 6px;
  line-height: 1.1;
}
.page-sub { color: var(--ink-2); margin: 0 0 28px; font-size: 17px; }

/* ========= CARDS ========= */
.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.card.flat { box-shadow: none; }

/* ========= BUTTONS ========= */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 22px;
  border-radius: 16px;
  font-weight: 700; font-size: 16px;
  transition: transform .15s ease, background .18s, box-shadow .18s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }

.btn-primary { background: var(--olive); color: #fff; box-shadow: 0 4px 14px rgba(74,112,67,0.28); }
.btn-primary:hover { background: var(--olive-dark); box-shadow: 0 6px 20px rgba(74,112,67,0.35); }

.btn-accent { background: var(--terra); color: #fff; box-shadow: 0 4px 14px rgba(224,122,95,0.3); }
.btn-accent:hover { background: var(--terra-dark); box-shadow: 0 6px 20px rgba(224,122,95,0.4); }

.btn-meal { background: var(--meal); color: #fff; box-shadow: 0 4px 14px rgba(42,155,181,0.28); }
.btn-meal:hover { background: var(--meal-dark); }

.btn-ghost { background: var(--white); color: var(--ink); border: 1.5px solid var(--line); }
.btn-ghost:hover { border-color: var(--ink-3); background: var(--cream); }

.btn-soft { background: var(--olive-soft); color: var(--olive-dark); }
.btn-soft:hover { background: #DDE8D6; }

.btn-lg { padding: 18px 28px; font-size: 18px; border-radius: 18px; }
.btn-xl { padding: 22px 32px; font-size: 20px; border-radius: 22px; }
.btn-block { width: 100%; }

/* ========= PROGRESS ========= */
.progress {
  height: 14px; border-radius: 999px;
  background: var(--cream-deep); overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--olive), #6FA05B);
  transition: width .5s cubic-bezier(.2,.8,.2,1);
  position: relative;
}
.progress-fill.accent { background: linear-gradient(90deg, var(--terra), #F09B7D); }

/* little food confetti inside progress */
.progress-fill::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 15% 50%, rgba(255,255,255,.35) 2px, transparent 3px),
    radial-gradient(circle at 45% 50%, rgba(255,255,255,.35) 2px, transparent 3px),
    radial-gradient(circle at 75% 50%, rgba(255,255,255,.35) 2px, transparent 3px);
  background-size: 30% 100%;
}

/* ========= INPUT ========= */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-weight: 700; font-size: 14px; color: var(--ink-2); }
.field label .req { color: var(--terra); margin-left: 4px; }

.input, .select, .textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1.5px solid var(--line);
  background: var(--white);
  font-size: 16px;
  transition: border-color .18s, box-shadow .18s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--olive);
  box-shadow: 0 0 0 4px var(--olive-soft);
}
.input-group { display: flex; gap: 8px; }
.input-group .input { flex: 1; }
.input-group .select { width: 130px; flex-shrink: 0; }

.textarea { min-height: 80px; resize: vertical; font-family: inherit; }

/* ========= BADGE ========= */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 13px; font-weight: 700;
}
.badge-ok    { background: #E5F0DA; color: var(--ok); }
.badge-warn  { background: var(--warn-soft); color: #9F6A1A; }
.badge-danger{ background: var(--danger-soft); color: var(--danger); }
.badge-meal  { background: var(--meal-soft); color: var(--meal-dark); }
.badge-soft  { background: var(--cream-deep); color: var(--ink-2); }

/* DLC dot */
.dlc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dlc-dot.ok    { background: var(--ok); }
.dlc-dot.warn  { background: var(--warn); }
.dlc-dot.danger{ background: var(--danger); }

/* ========= MODAL ========= */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(20,15,5,0.5);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .2s ease;
}
@media (min-width: 720px) { .modal-backdrop { align-items: center; padding: 24px; } }

.modal {
  background: var(--cream);
  width: 100%; max-width: 720px;
  max-height: 92vh;
  border-radius: 28px 28px 0 0;
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: slideUp .3s cubic-bezier(.2,.9,.2,1);
}
@media (min-width: 720px) {
  .modal { border-radius: 24px; max-height: 88vh; }
}
.modal-head {
  padding: 20px 24px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--line);
  background: var(--white);
}
.modal-title { font-family: var(--font-display); font-weight: 600; font-size: 22px; margin: 0; flex: 1; }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 16px 24px 20px; border-top: 1px solid var(--line);
  background: var(--white);
  display: flex; gap: 10px; flex-wrap: wrap;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ========= TOAST ========= */
.toast-stack {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--olive-dark); color: #fff;
  padding: 14px 20px; border-radius: 16px;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
  animation: toastIn .4s cubic-bezier(.2,.9,.2,1);
  display: flex; align-items: center; gap: 10px;
  max-width: 90vw;
}
.toast.accent { background: var(--terra); }
.toast.meal { background: var(--meal); }
@keyframes toastIn { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ========= CONFETTI ========= */
.confetti-root {
  position: fixed; inset: 0; pointer-events: none; z-index: 150; overflow: hidden;
}
.confetti-piece {
  position: absolute; top: -20px;
  font-size: 24px;
  animation: fall 1.8s ease-in forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ========= ANIMATIONS ========= */
@keyframes popIn {
  0% { transform: scale(0.4); opacity: 0; }
  80% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.pop-in { animation: popIn .35s cubic-bezier(.2,.9,.2,1); }

@keyframes bump { 50% { transform: scale(1.12); } }
.bump { animation: bump .25s ease; }

/* ========= SCROLLBAR ========= */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* ========= UTIL ========= */
.row { display: flex; align-items: center; gap: 12px; }
.col { display: flex; flex-direction: column; }
.grow { flex: 1; }
.muted { color: var(--ink-3); }
.txt-sm { font-size: 14px; }
.txt-lg { font-size: 20px; }
.bold { font-weight: 700; }
.center { text-align: center; }
.mono { font-variant-numeric: tabular-nums; }
.spacer-sm { height: 12px; }
.spacer-md { height: 24px; }
.spacer-lg { height: 40px; }

.screen-enter { animation: screenEnter .25s ease both; }
@keyframes screenEnter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }


/* --- MEAL v7.6 : typo display changée (j de Fraunces trop baroque) --- */
:root { --font-display: 'Lora', 'Georgia', 'Times New Roman', serif; }

/* --- MEAL v7.2 --- */
.brand-tag-visible {
  display: inline !important;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--olive-dark);
  letter-spacing: -0.005em;
  white-space: normal;
  line-height: 1.15;
}
@media (min-width: 520px) { .brand-tag-visible { font-size: 21px; } }
@media (min-width: 720px) { .brand-tag-visible { font-size: 22px; } }
.pill {
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink-2);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s, color .15s;
}
.pill.pill-on { background: var(--meal-dark); color: #fff; border-color: var(--meal-dark); }

/* --- v7.4 : modales plus lisibles sur mobile + bouton retour évident --- */
.modal-title {
  font-size: 17px !important;
  line-height: 1.15;
}
@media (min-width: 520px) { .modal-title { font-size: 20px !important; } }
@media (min-width: 720px) { .modal-title { font-size: 22px !important; } }

.modal-close-btn {
  background: var(--cream-deep);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 8px 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink-2);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.modal-close-btn:hover { background: var(--line); }

/* v7.26 : modal scrolling simplifié au maximum.
   Approche : backdrop = scroller unique (overflow-y auto, scroll touch natif).
   La modale a sa hauteur naturelle, le contenu défile dans le backdrop.
   Pas de min-height (qui forçait la modale à occuper tout l'écran et bloquait
   le scroll sur Brave Android). Pas de sticky head/foot (qui cassaient aussi
   le scroll dans certains contextes). */
.modal-backdrop {
  position: fixed !important;
  inset: 0 !important;
  display: flex !important;
  align-items: flex-start !important;
  justify-content: center !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
  overscroll-behavior: contain !important;
  padding: 0 !important;
  z-index: 1000 !important;
  background: rgba(0, 0, 0, 0.45) !important;
}
@media (min-width: 720px) {
  .modal-backdrop {
    padding: 24px !important;
    align-items: flex-start !important;
  }
}
.modal {
  position: relative !important;
  width: 100% !important;
  max-width: 100% !important;
  height: auto !important;
  margin: 0 !important;
  border-radius: 0 !important;
  display: block !important;
  background: var(--white) !important;
}
@media (min-width: 720px) {
  .modal {
    max-width: 720px !important;
    border-radius: 24px !important;
    margin: 0 auto !important;
  }
}
.modal-head {
  position: relative !important;
  background: var(--white) !important;
}
.modal-foot {
  position: relative !important;
  background: var(--white) !important;
}
.modal-body {
  overflow: visible !important;
}
/* v7.14 : densification mobile */
.page-title {
  font-size: clamp(22px, 4.5vw, 42px) !important;
  margin: 0 0 4px !important;
}
.page-sub {
  font-size: 15px !important;
  margin: 0 0 20px !important;
  line-height: 1.35 !important;
}
@media (max-width: 520px) {
  .main { padding: 18px 14px 80px !important; }
  .page-sub { font-size: 14px !important; margin-bottom: 16px !important; }
  .btn-lg { padding: 12px 18px !important; font-size: 15px !important; border-radius: 14px !important; }
  .btn { padding: 10px 14px !important; font-size: 14px !important; }
  .pill { padding: 6px 12px !important; font-size: 12px !important; }
}

function exportInventoryCSV(state, toast) {
